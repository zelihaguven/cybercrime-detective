app = "detective-game-server"
primary_region = "fra"

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "detective_data"
  destination = "/data"
